<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saran & Masukan</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  height: 100vh;
  background: radial-gradient(circle at top, #1a002b, #05010a);
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

/* background glow */
.blob {
  position: absolute;
  width: 300px;
  height: 300px;
  background: #ff00ff;
  filter: blur(120px);
  opacity: 0.4;
  animation: float 10s infinite alternate ease-in-out;
}
.blob:nth-child(1){top:10%;left:10%;}
.blob:nth-child(2){bottom:10%;right:10%;background:#00ffff;}

@keyframes float {
  from {transform: translateY(0);}
  to {transform: translateY(60px);}
}

/* card */
.card {
  width: 340px;
  padding: 30px;
  border-radius: 20px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  box-shadow: 0 0 40px rgba(255,0,255,0.3);
  border: 1px solid rgba(255,255,255,0.1);
}

h2 {
  text-align: center;
  color: #fff;
  margin-bottom: 20px;
  text-shadow: 0 0 15px #ff00ff;
}

.input-group {
  position: relative;
  margin-bottom: 15px;
}

input, textarea {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: rgba(0,0,0,0.5);
  color: white;
  outline: none;
}

input:focus, textarea:focus {
  box-shadow: 0 0 10px #ff00ff;
}

#eyeBtn {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  cursor: pointer;
}

/* button */
button {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(45deg, #ff00ff, #00ffff);
  color: white;
  font-weight: bold;
  cursor: pointer;
}
button:hover {
  box-shadow: 0 0 20px #ff00ff;
}

/* popup tengah */
.popup-center {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: none;
  justify-content: center;
  align-items: center;
  backdrop-filter: blur(10px);
  background: rgba(0,0,0,0.5);
  z-index: 999;
}

.popup-box {
  background: rgba(20,20,20,0.95);
  padding: 30px;
  border-radius: 20px;
  text-align: center;
  color: white;
  box-shadow: 0 0 30px #00ffcc;
  animation: popUp 0.4s ease;
}

.popup-box .check {
  font-size: 40px;
  color: #00ffcc;
  margin-bottom: 10px;
  animation: bounce 0.6s;
}

@keyframes popUp {
  from {transform: scale(0.5); opacity: 0;}
  to {transform: scale(1); opacity: 1;}
}

@keyframes bounce {
  0% {transform: scale(0.5);}
  50% {transform: scale(1.3);}
  100% {transform: scale(1);}
}
</style>
</head>

<body>

<div class="blob"></div>
<div class="blob"></div>

<div class="card">
  <h2>💬 Saran & Masukan</h2>

  <div class="input-group">
    <input type="text" id="nama" placeholder="👤 Nama">
  </div>

  <div class="input-group">
    <input type="text" id="email" placeholder="📧 Email" oninput="sensorEmail(this)">
    <span id="eyeBtn" onclick="toggleEmail()">👁️</span>
  </div>

  <div class="input-group">
    <textarea id="pesan" rows="4" placeholder="Tulis saran lo..."></textarea>
  </div>

  <button onclick="kirim()">🚀 Kirim Sekarang</button>
</div>

<!-- popup sukses -->
<div class="popup-center" id="popup">
  <div class="popup-box">
    <div class="check">✔️</div>
    <h3>Sukses!</h3>
    <p>Pesan berhasil terkirim</p>
  </div>
</div>

<script>
let emailAsli = "";
let modeLihat = false;

function sensorEmail(input) {
  emailAsli = input.value;

  if (!modeLihat && emailAsli.includes("@")) {
    let [nama, domain] = emailAsli.split("@");

    let namaSensor = nama.length > 2
      ? nama.slice(0,2) + "***"
      : nama[0] + "***";

    input.value = namaSensor + "@" + domain;
  }
}

function toggleEmail() {
  let input = document.getElementById("email");
  modeLihat = !modeLihat;

  if (modeLihat) {
    input.value = emailAsli;
    eyeBtn.innerText = "🙈";
  } else {
    sensorEmail(input);
    eyeBtn.innerText = "👁️";
  }
}

function sensorEmailKirim(email) {
  if (email.includes("@")) {
    let [nama, domain] = email.split("@");

    let namaSensor = nama.length > 2
      ? nama.slice(0,2) + "***"
      : nama[0] + "***";

    return namaSensor + "@" + domain;
  }
  return email;
}

function kirim() {
  let nama = document.getElementById("nama").value;
  let email = sensorEmailKirim(emailAsli);
  let pesan = document.getElementById("pesan").value;

  if (!nama || !email || !pesan) {
    alert("Isi semua dulu!");
    return;
  }

  let text = `📩 Saran Masuk\n\n👤 Nama: ${nama}\n📧 Email: ${email}\n💬 Pesan: ${pesan}`;

  let token = "8603918241:AAGFRKm-E5JH6eRRvT6iFx4UYvDzqNTiDuE";
  let chat_id = "7848302341";

  fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      chat_id: chat_id,
      text: text
    })
  })
  .then(() => {
    let popup = document.getElementById("popup");
    popup.style.display = "flex";

    setTimeout(() => {
      popup.style.display = "none";
    }, 2000);

    document.getElementById("nama").value = "";
    document.getElementById("email").value = "";
    document.getElementById("pesan").value = "";
    emailAsli = "";
  })
  .catch(() => {
    alert("Gagal kirim!");
  });
}
</script>

</body>
</html>
